services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: skunk_sharp
      POSTGRES_PASSWORD: skunk_sharp
      POSTGRES_DB: skunk_sharp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skunk_sharp"]
      interval: 5s
      timeout: 3s
      retries: 10
